      <stop offset="0%" stop-color="#024450"/>
      <stop offset="100%" stop-color="#7eb3bf"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9efe8"/>
