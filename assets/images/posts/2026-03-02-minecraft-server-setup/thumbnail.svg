  <text x="80" y="390" fill="#ffffff" font-size="26" font-family="Noto Sans JP, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif" opacity="0.9">Tailscale + 制限SSH + 2ワールド分離</text>

  <g transform="translate(790 150)">
    <rect x="60" y="40" width="300" height="300" rx="10" fill="#ffffff" fill-opacity="0.92"/>
    <rect x="60" y="40" width="300" height="300" rx="10" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="60" y="40" width="300" height="300" rx="10" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.35"/>

    <!-- 8x8 pattern (1=eyes/mouth, 0=other)
         00000000
