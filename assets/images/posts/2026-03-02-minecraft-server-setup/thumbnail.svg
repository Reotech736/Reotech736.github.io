  <rect x="80" y="90" width="265" height="40" rx="20" fill="#ffffff" fill-opacity="0.2"/>
  <text x="100" y="118" fill="#ffffff" font-size="18" font-family="Noto Sans JP, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif" font-weight="600">MINECRAFT SERVER</text>

