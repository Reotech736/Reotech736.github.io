<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#024450"/>
      <stop offset="100%" stop-color="#7eb3bf"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9efe8"/>
      <stop offset="100%" stop-color="#b2d8c5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="110" r="95" fill="#ffffff" fill-opacity="0.12"/>
  <circle cx="1000" cy="520" r="150" fill="#ffffff" fill-opacity="0.1"/>

  <rect x="80" y="90" width="265" height="40" rx="20" fill="#ffffff" fill-opacity="0.2"/>
  <text x="100" y="118" fill="#ffffff" font-size="18" font-family="Noto Sans JP, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif" font-weight="600">MINECRAFT SERVER</text>

  <text x="80" y="250" fill="#ffffff" font-size="56" font-family="Noto Sans JP, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif" font-weight="700">Minecraft serverをDockerで</text>
  <text x="80" y="320" fill="#ffffff" font-size="52" font-family="Noto Sans JP, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif" font-weight="700">安全運用する</text>
  <text x="80" y="390" fill="#ffffff" font-size="26" font-family="Noto Sans JP, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif" opacity="0.9">Tailscale + 制限SSH + 2ワールド分離</text>

  <g transform="translate(790 150)">
    <rect x="60" y="40" width="300" height="300" rx="10" fill="url(#card)"/>
    <rect x="60" y="40" width="300" height="300" rx="10" fill="#000000" fill-opacity="0.08"/>
    <rect x="60" y="40" width="300" height="300" rx="10" fill="none" stroke="#000000" stroke-width="10"/>

    <!-- 8x8 pattern (1=eyes/mouth, 0=other)
         00000000
         00000000
         01100110
         01100110
         00011000
         00111100
         00111100
         00100100 -->
    <rect x="120" y="130" width="60" height="60" fill="#000000"/>
    <rect x="240" y="130" width="60" height="60" fill="#000000"/>
    <rect x="180" y="190" width="60" height="30" fill="#000000"/>
    <rect x="150" y="220" width="120" height="60" fill="#000000"/>
    <rect x="150" y="280" width="30" height="30" fill="#000000"/>
    <rect x="240" y="280" width="30" height="30" fill="#000000"/>
  </g>
</svg>
