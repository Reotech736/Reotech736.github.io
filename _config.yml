# サイト設定
title: Reo's Tech Blog
author: Reo Komatsubara
contact: "/contact/"
description: >-
  エンジニアの学習記録 兼 備忘録
baseurl: ""
url: "https://reotech736.github.io"
github_username: Reotech736

# ビルド設定
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  study_logs:
    output: true
    permalink: /study-logs/:slug/
  terms:
    output: true
    permalink: /terms/:slug/

# デフォルト設定
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Reo Komatsubara"
  - scope:
      path: ""
      type: "study_logs"
    values:
      layout: "study-log"
      author: "Reo Komatsubara"
  - scope:
      path: ""
      type: "terms"
    values:
      layout: "term"
      author: "Reo Komatsubara"

# Markdown設定
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 除外ファイル
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# タイムゾーン
timezone: Asia/Tokyo

# ページネーション
paginate: 10
paginate_path: "/blog/page:num/"
