name: Update contributions SVG

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 03:00 JST (18:00 UTC)
    - cron: "0 18 * * *"

permissions:
  contents: write

concurrency:
  group: update-contributions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Generate contributions SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_LOGIN: Reotech736
        run: node scripts/generate-contributions-svg.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- assets/images/contributions.svg; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/images/contributions.svg

          last_subject="$(git log -1 --pretty=%s)"
          last_author="$(git log -1 --pretty=%ae)"
          changed_files="$(git show --name-only --pretty='' HEAD | sed '/^$/d')"

          if [ "$last_subject" = "chore: update contributions svg" ] && \
             [ "$last_author" = "github-actions[bot]@users.noreply.github.com" ] && \
             [ "$changed_files" = "assets/images/contributions.svg" ]; then
            git commit --amend --no-edit --reset-author
            git push --force-with-lease origin HEAD:main
          else
            git commit -m "chore: update contributions svg"
            git push origin HEAD:main
          fi
