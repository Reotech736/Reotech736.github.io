---
layout: default
---

<article class="post">
    <header class="post-header study-log-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">
                {{ page.date | date: "%Y年%m月%d日" }}
            </time>
            {% if page.author %}
            <span class="post-author">by {{ page.author }}</span>
            {% endif %}
        </div>
        {% if page.summary %}
        <p class="page-intro">{{ page.summary }}</p>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content }}
    </div>
</article>

<div class="tag-back study-log-back">
    <a href="{{ '/study-logs/' | relative_url }}">学習記録一覧へ戻る</a>
</div>
